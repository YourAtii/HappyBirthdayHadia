<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Hadia 🎂</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  min-height: 100vh;
  background: #050010;
  font-family: 'Poppins', sans-serif;
  overflow-x: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
}

/* ===== AURORA BG ===== */
.aurora {
  position: fixed;
  inset: 0;
  z-index: 0;
  overflow: hidden;
}
.aurora-blob {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.35;
  animation: drift ease-in-out infinite alternate;
}
.ab1 { width:600px;height:600px;background:#9b00ff;top:-100px;left:-150px;animation-duration:9s; }
.ab2 { width:500px;height:500px;background:#ff006e;top:30%;right:-100px;animation-duration:12s; }
.ab3 { width:400px;height:400px;background:#00d4ff;bottom:-80px;left:20%;animation-duration:8s; }
.ab4 { width:350px;height:350px;background:#ff6fd8;top:60%;left:-50px;animation-duration:11s; }
@keyframes drift {
  0%   { transform: translate(0,0) scale(1); }
  100% { transform: translate(40px,30px) scale(1.15); }
}

/* ===== STARS ===== */
#stars { position:fixed;inset:0;z-index:1;pointer-events:none; }
.star {
  position:absolute;border-radius:50%;background:#fff;
  animation: twinkle ease-in-out infinite alternate;
}
@keyframes twinkle {
  0%   { opacity:0.1; transform:scale(0.8); }
  100% { opacity:0.9; transform:scale(1.3); }
}

/* ===== PARTICLES ===== */
#particles { position:fixed;inset:0;z-index:2;pointer-events:none; }
.particle {
  position:absolute;
  border-radius:50%;
  animation: particle-float linear infinite;
}
@keyframes particle-float {
  0%   { transform:translateY(100vh) rotate(0deg); opacity:0; }
  10%  { opacity:1; }
  90%  { opacity:1; }
  100% { transform:translateY(-10vh) rotate(360deg); opacity:0; }
}

/* ===== CANVAS for fireworks ===== */
#fireworksCanvas {
  position:fixed;inset:0;z-index:3;pointer-events:none;
}

/* ===== GLASS CARD ===== */
.card {
  position:relative;z-index:10;
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 32px;
  padding: 52px 44px 44px;
  max-width: 540px;
  width: 92%;
  text-align: center;
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.05),
    0 30px 80px rgba(0,0,0,0.6),
    inset 0 1px 0 rgba(255,255,255,0.1);
  animation: card-in 1s cubic-bezier(0.16,1,0.3,1) both;
}
@keyframes card-in {
  0%   { opacity:0; transform:translateY(60px) scale(0.92); }
  100% { opacity:1; transform:translateY(0) scale(1); }
}

/* inner glow ring */
.card::before {
  content:'';
  position:absolute;inset:-1px;
  border-radius:33px;
  background: linear-gradient(135deg, rgba(255,107,219,0.3), rgba(109,40,217,0.2), rgba(0,212,255,0.2));
  z-index:-1;
  filter:blur(2px);
}

/* ===== CANDLES ===== */
.candles-row {
  display:flex;
  justify-content:center;
  gap:18px;
  margin-bottom:22px;
}
.candle-wrap {
  display:flex;flex-direction:column;align-items:center;
  animation: candle-bob 2s ease-in-out infinite alternate;
}
.candle-wrap:nth-child(2){ animation-delay:.3s; }
.candle-wrap:nth-child(3){ animation-delay:.6s; }
.candle-wrap:nth-child(4){ animation-delay:.9s; }
.candle-wrap:nth-child(5){ animation-delay:1.2s; }
@keyframes candle-bob {
  0%   { transform:translateY(0); }
  100% { transform:translateY(-5px); }
}
.flame {
  width:12px;height:20px;
  background: radial-gradient(ellipse at 50% 80%, #fff700 0%, #ff8c00 50%, transparent 100%);
  border-radius:50% 50% 20% 20% / 60% 60% 40% 40%;
  animation: flicker 0.3s ease-in-out infinite alternate;
  box-shadow: 0 0 10px #ff8c00, 0 0 20px #ff4400;
  position:relative;
}
@keyframes flicker {
  0%   { transform:scaleX(1) scaleY(1) rotate(-2deg); opacity:1; }
  100% { transform:scaleX(0.85) scaleY(1.1) rotate(2deg); opacity:0.9; }
}
.candle-body {
  width:10px;height:30px;
  border-radius:3px;
  background: linear-gradient(180deg, #fff 0%, #f8d7ff 40%, #e8b4ff 100%);
  box-shadow: 0 2px 8px rgba(0,0,0,0.4);
}
.candle-drip {
  width:12px;height:5px;
  background:rgba(248,215,255,0.6);
  border-radius:0 0 6px 6px;
}

/* ===== TITLE ===== */
.subtitle {
  font-size:0.72rem;
  letter-spacing:7px;
  text-transform:uppercase;
  color:rgba(255,180,255,0.7);
  margin-bottom:4px;
  font-weight:300;
}
.hb-text {
  font-family:'Great Vibes',cursive;
  font-size:clamp(2.8rem,10vw,4.8rem);
  background: linear-gradient(135deg, #ff9de2 0%, #ffcf77 40%, #ff6fd8 70%, #c084fc 100%);
  background-size:300% auto;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  animation: text-shine 4s linear infinite;
  line-height:1.15;
}
@keyframes text-shine {
  0%  { background-position:0% center; }
  100%{ background-position:300% center; }
}
.name-text {
  font-family:'Great Vibes',cursive;
  font-size:clamp(4rem,15vw,7rem);
  background: linear-gradient(135deg, #fff 0%, #ffcf77 35%, #ff9de2 65%, #c084fc 100%);
  background-size:300% auto;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  animation: text-shine 3s linear infinite reverse;
  line-height:1;
  filter: drop-shadow(0 0 30px rgba(255,157,226,0.5));
  margin-bottom:6px;
}

/* ===== DIVIDER ===== */
.glow-line {
  display:flex;align-items:center;gap:12px;
  margin:18px auto;
  justify-content:center;
}
.gl-dot {
  width:6px;height:6px;border-radius:50%;
  background:#c084fc;
  box-shadow:0 0 8px #c084fc;
  animation:pulse-dot 1.5s ease-in-out infinite alternate;
}
.gl-dot:nth-child(2){ background:#ff9de2;box-shadow:0 0 8px #ff9de2;animation-delay:.3s; }
.gl-dot:nth-child(3){ background:#ffcf77;box-shadow:0 0 8px #ffcf77;animation-delay:.6s; }
.gl-dot:nth-child(4){ background:#ff9de2;box-shadow:0 0 8px #ff9de2;animation-delay:.9s; }
.gl-dot:nth-child(5){ background:#c084fc;box-shadow:0 0 8px #c084fc;animation-delay:1.2s; }
.gl-line { flex:1;max-width:80px;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.2),transparent); }
@keyframes pulse-dot {
  0%  { transform:scale(0.7);opacity:0.5; }
  100%{ transform:scale(1.3);opacity:1; }
}

/* ===== MESSAGE ===== */
.message {
  font-size:0.93rem;
  color:rgba(230,210,255,0.85);
  line-height:1.9;
  margin:6px 0 26px;
  font-weight:300;
}
.message .highlight {
  background: linear-gradient(135deg,#ffcf77,#ff9de2);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  font-weight:600;
}

/* ===== MUSIC BTN ===== */
.music-btn {
  position:relative;overflow:hidden;
  display:inline-flex;align-items:center;gap:10px;
  background:linear-gradient(135deg,rgba(192,132,252,0.2),rgba(255,107,219,0.2));
  border:1px solid rgba(192,132,252,0.5);
  color:#f0d8ff;
  padding:13px 32px;
  border-radius:50px;
  cursor:pointer;
  font-family:'Poppins',sans-serif;
  font-size:0.85rem;
  font-weight:600;
  letter-spacing:1.5px;
  text-transform:uppercase;
  transition:all 0.3s;
  box-shadow: 0 0 20px rgba(192,132,252,0.2);
}
.music-btn::before {
  content:'';
  position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(192,132,252,0.3),rgba(255,107,219,0.3));
  opacity:0;
  transition:opacity 0.3s;
  border-radius:50px;
}
.music-btn:hover::before { opacity:1; }
.music-btn:hover {
  transform:translateY(-2px) scale(1.03);
  box-shadow:0 8px 30px rgba(192,132,252,0.4);
  border-color:rgba(192,132,252,0.8);
}
.music-btn:active { transform:scale(0.97); }
.note-icon {
  font-size:1.1rem;
  display:inline-block;
  animation:note-dance 0.8s ease-in-out infinite alternate;
}
@keyframes note-dance {
  0%  { transform:translateY(0) rotate(-10deg); }
  100%{ transform:translateY(-4px) rotate(10deg); }
}
.note-icon.still { animation:none; }

/* ===== EQUALIZER (playing indicator) ===== */
.eq {
  display:none;align-items:flex-end;gap:2px;height:18px;
}
.eq.active { display:flex; }
.eq-bar {
  width:3px;background:linear-gradient(180deg,#ff9de2,#c084fc);
  border-radius:2px;
  animation:eq-anim 0.6s ease-in-out infinite alternate;
}
.eq-bar:nth-child(1){ height:6px;animation-delay:0s; }
.eq-bar:nth-child(2){ height:14px;animation-delay:.1s; }
.eq-bar:nth-child(3){ height:10px;animation-delay:.2s; }
.eq-bar:nth-child(4){ height:16px;animation-delay:.15s; }
.eq-bar:nth-child(5){ height:8px;animation-delay:.05s; }
@keyframes eq-anim {
  0%  { transform:scaleY(0.4); }
  100%{ transform:scaleY(1); }
}

/* ===== BALLOONS ===== */
#balloons { position:fixed;bottom:-120px;width:100%;pointer-events:none;z-index:2; }
.balloon {
  position:absolute;
  border-radius:50% 50% 48% 52% / 55% 55% 45% 45%;
  animation:float-balloon linear infinite;
}
.balloon::after {
  content:'';position:absolute;bottom:-22px;left:49%;
  width:2px;height:22px;
  background:rgba(255,255,255,0.3);
}
.balloon::before {
  content:'';position:absolute;bottom:8px;left:30%;
  width:40%;height:20%;
  background:rgba(255,255,255,0.25);
  border-radius:50%;
  transform:rotate(-30deg);
}
@keyframes float-balloon {
  0%   { transform:translateY(0) rotate(-4deg);opacity:0.8; }
  50%  { transform:translateY(-55vh) rotate(4deg); }
  100% { transform:translateY(-115vh) rotate(-4deg);opacity:0; }
}

/* ===== CONFETTI ===== */
#confetti { position:fixed;inset:0;z-index:3;pointer-events:none; }
.conf {
  position:absolute;top:-20px;
  animation:conf-fall linear infinite;
}
@keyframes conf-fall {
  0%   { transform:translateY(0) rotate(0deg) skewX(0deg);opacity:1; }
  100% { transform:translateY(110vh) rotate(540deg) skewX(20deg);opacity:0; }
}

footer {
  position:relative;z-index:10;
  margin-top:24px;
  font-size:0.7rem;
  color:rgba(255,255,255,0.18);
  letter-spacing:3px;
  text-transform:uppercase;
}
</style>
</head>
<body>

<div class="aurora">
  <div class="aurora-blob ab1"></div>
  <div class="aurora-blob ab2"></div>
  <div class="aurora-blob ab3"></div>
  <div class="aurora-blob ab4"></div>
</div>

<div id="stars"></div>
<canvas id="fireworksCanvas"></canvas>
<div id="particles"></div>
<div id="balloons"></div>
<div id="confetti"></div>

<div class="card">
  <!-- Candles -->
  <div class="candles-row">
    <div class="candle-wrap"><div class="flame"></div><div class="candle-body"></div><div class="candle-drip"></div></div>
    <div class="candle-wrap"><div class="flame"></div><div class="candle-body"></div><div class="candle-drip"></div></div>
    <div class="candle-wrap"><div class="flame"></div><div class="candle-body"></div><div class="candle-drip"></div></div>
    <div class="candle-wrap"><div class="flame"></div><div class="candle-body"></div><div class="candle-drip"></div></div>
    <div class="candle-wrap"><div class="flame"></div><div class="candle-body"></div><div class="candle-drip"></div></div>
  </div>

  <div class="subtitle">✦ wishing you a ✦</div>
  <div class="hb-text">Happy Birthday</div>
  <div class="name-text">Hadia</div>

  <div class="glow-line">
    <div class="gl-line"></div>
    <div class="gl-dot"></div>
    <div class="gl-dot"></div>
    <div class="gl-dot"></div>
    <div class="gl-dot"></div>
    <div class="gl-dot"></div>
    <div class="gl-line"></div>
  </div>

  <p class="message">
    May every moment of your day<br>
    be filled with <span class="highlight">magic & joy ✨</span><br>
    You deserve nothing but the <span class="highlight">very best</span> —<br>
    today and always. 💖
  </p>

  <button class="music-btn" id="musicBtn" onclick="toggleMusic()">
    <span class="note-icon still" id="noteIcon">🎵</span>
    <div class="eq" id="eqBars">
      <div class="eq-bar"></div><div class="eq-bar"></div>
      <div class="eq-bar"></div><div class="eq-bar"></div>
      <div class="eq-bar"></div>
    </div>
    <span id="musicText">Play Birthday Tune</span>
  </button>
</div>

<footer>made with 💜 for hadia</footer>

<script>
// ===== STARS =====
const starsEl = document.getElementById('stars');
for(let i=0;i<150;i++){
  const s=document.createElement('div');
  s.className='star';
  const sz=Math.random()*2.5+0.5;
  s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;animation-delay:${Math.random()*4}s;animation-duration:${1.5+Math.random()*2.5}s;`;
  starsEl.appendChild(s);
}

// ===== FLOATING PARTICLES =====
const particlesEl=document.getElementById('particles');
const pColors=['rgba(255,157,226,0.6)','rgba(192,132,252,0.6)','rgba(255,207,119,0.6)','rgba(0,212,255,0.4)','rgba(255,255,255,0.4)'];
for(let i=0;i<30;i++){
  const p=document.createElement('div');
  p.className='particle';
  const sz=2+Math.random()*5;
  p.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;background:${pColors[Math.floor(Math.random()*pColors.length)]};animation-duration:${8+Math.random()*12}s;animation-delay:${Math.random()*10}s;`;
  particlesEl.appendChild(p);
}

// ===== BALLOONS =====
const balloonsEl=document.getElementById('balloons');
const bColors=['#ff6b9d','#ff9de2','#a78bfa','#818cf8','#fb923c','#f472b6','#e879f9','#38bdf8'];
for(let i=0;i<16;i++){
  const b=document.createElement('div');
  b.className='balloon';
  const c=bColors[Math.floor(Math.random()*bColors.length)];
  const w=38+Math.random()*28;
  b.style.cssText=`left:${Math.random()*100}%;background:${c};width:${w}px;height:${w*1.2}px;animation-duration:${7+Math.random()*9}s;animation-delay:${Math.random()*10}s;box-shadow:0 0 15px ${c}66;`;
  balloonsEl.appendChild(b);
}

// ===== CONFETTI =====
const confEl=document.getElementById('confetti');
const cfColors=['#ff9de2','#ffcf77','#a78bfa','#38bdf8','#f9a8d4','#ffffff','#fb923c'];
for(let i=0;i<60;i++){
  const c=document.createElement('div');
  c.className='conf';
  const color=cfColors[Math.floor(Math.random()*cfColors.length)];
  const w=5+Math.random()*9,h=5+Math.random()*9;
  const isCircle=Math.random()>0.5;
  c.style.cssText=`left:${Math.random()*100}%;width:${w}px;height:${h}px;background:${color};border-radius:${isCircle?'50%':'2px'};animation-duration:${5+Math.random()*8}s;animation-delay:${Math.random()*10}s;opacity:0.85;`;
  confEl.appendChild(c);
}

// ===== FIREWORKS CANVAS =====
const canvas=document.getElementById('fireworksCanvas');
const ctx=canvas.getContext('2d');
let W,H;
function resize(){ W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight; }
resize();
window.addEventListener('resize',resize);

const particles=[];
function createFirework(x,y){
  const count=60+Math.floor(Math.random()*40);
  const hue=Math.random()*360;
  for(let i=0;i<count;i++){
    const angle=Math.random()*Math.PI*2;
    const speed=2+Math.random()*5;
    particles.push({
      x,y,
      vx:Math.cos(angle)*speed,
      vy:Math.sin(angle)*speed,
      life:1,
      decay:0.015+Math.random()*0.015,
      size:2+Math.random()*3,
      color:`hsla(${hue+Math.random()*40},100%,70%,`
    });
  }
}

// auto fire on load
setTimeout(()=>{ createFirework(W*0.3,H*0.35); },500);
setTimeout(()=>{ createFirework(W*0.7,H*0.3); },900);
setTimeout(()=>{ createFirework(W*0.5,H*0.25); },1400);
setTimeout(()=>{ createFirework(W*0.2,H*0.4); },1900);
setTimeout(()=>{ createFirework(W*0.8,H*0.35); },2300);

// click to fire
document.addEventListener('click',e=>{
  if(!e.target.closest('.music-btn')) createFirework(e.clientX,e.clientY);
});

function animFireworks(){
  ctx.clearRect(0,0,W,H);
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx; p.y+=p.vy;
    p.vy+=0.06; p.vx*=0.99;
    p.life-=p.decay;
    if(p.life<=0){ particles.splice(i,1);continue; }
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);
    ctx.fillStyle=p.color+p.life+')';
    ctx.fill();
  }
  requestAnimationFrame(animFireworks);
}
animFireworks();

// ===== MUSIC =====
let audioCtx=null,isPlaying=false,currentTimeout=null,oscs=[];

const NOTES=[
  [261.6,.5],[261.6,.5],[293.7,1],[261.6,1],[349.2,1],[329.6,2],
  [261.6,.5],[261.6,.5],[293.7,1],[261.6,1],[392.0,1],[349.2,2],
  [261.6,.5],[261.6,.5],[523.3,1],[440.0,1],[349.2,1],[329.6,1],[293.7,2],
  [466.2,.5],[466.2,.5],[440.0,1],[349.2,1],[392.0,1],[349.2,2.5]
];

function playTune(){
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  const tempo=0.42;
  let t=audioCtx.currentTime+0.1;
  NOTES.forEach(([freq,beats])=>{
    const osc=audioCtx.createOscillator();
    const gain=audioCtx.createGain();
    // add reverb feel with 2nd osc
    const osc2=audioCtx.createOscillator();
    const gain2=audioCtx.createGain();
    osc.connect(gain);gain.connect(audioCtx.destination);
    osc2.connect(gain2);gain2.connect(audioCtx.destination);
    osc.type='triangle'; osc.frequency.value=freq;
    osc2.type='sine'; osc2.frequency.value=freq*2;
    gain.gain.setValueAtTime(0,t);
    gain.gain.linearRampToValueAtTime(0.28,t+0.04);
    gain.gain.linearRampToValueAtTime(0,t+beats*tempo-0.04);
    gain2.gain.setValueAtTime(0,t);
    gain2.gain.linearRampToValueAtTime(0.06,t+0.04);
    gain2.gain.linearRampToValueAtTime(0,t+beats*tempo-0.04);
    osc.start(t);osc.stop(t+beats*tempo);
    osc2.start(t);osc2.stop(t+beats*tempo);
    oscs.push(osc,osc2);
    t+=beats*tempo;
  });
  const dur=NOTES.reduce((s,[,b])=>s+b*tempo,0)*1000;
  currentTimeout=setTimeout(()=>{ if(isPlaying){ oscs=[];playTune(); }},dur+300);
}

function stopTune(){
  if(currentTimeout) clearTimeout(currentTimeout);
  oscs.forEach(o=>{ try{o.stop();}catch(e){} });
  oscs=[];
}

function toggleMusic(){
  const btn=document.getElementById('musicBtn');
  const ni=document.getElementById('noteIcon');
  const eq=document.getElementById('eqBars');
  const txt=document.getElementById('musicText');
  if(!isPlaying){
    isPlaying=true;playTune();
    ni.classList.remove('still');
    eq.classList.add('active');
    txt.textContent='Pause Music';
    btn.style.background='linear-gradient(135deg,rgba(192,132,252,0.35),rgba(255,107,219,0.35))';
    btn.style.boxShadow='0 0 30px rgba(192,132,252,0.5)';
  } else {
    isPlaying=false;stopTune();
    ni.classList.add('still');
    eq.classList.remove('active');
    txt.textContent='Play Birthday Tune';
    btn.style.background='';
    btn.style.boxShadow='';
  }
}
</script>
</body>
</html>
